<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Game One - Play</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    header {
      height: 60px;
      padding: 0 20px;
      background: #111;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .back {
      text-decoration: none;
      color: white;
      background: #333;
      padding: 8px 12px;
      border-radius: 6px;
    }

    .back:hover {
      background: #555;
    }

    .game-wrapper {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: auto;
      padding: 10px 0;
      -webkit-overflow-scrolling: touch;
    }

    .game-container {
      width: 979px;
      height: 2119px;
      transform-origin: top center;
      flex-shrink: 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <header>
    <div>Tris</div>
    <a class="back" href="index.html">Back</a>
  </header>

  <div class="game-wrapper">
    <div class="game-container" id="gameContainer">
      <iframe src="builds/game1/index.html" title="Game One"></iframe>
    </div>
  </div>

<script>
function scaleGame() {
  const container = document.getElementById("gameContainer");

  const gameWidth = 979;
  const gameHeight = 2119;
  const headerHeight = 60;

  const availableWidth = window.innerWidth - 20;
  const availableHeight = window.innerHeight - headerHeight - 20;

  let scale;

  if (window.innerWidth <= 768) {
    // Start with width-based scale
    const widthScale = availableWidth / gameWidth;

    // Height-based scale (so it doesn't cut off bottom)
    const heightScale = availableHeight / gameHeight;

    // Blend them (THIS is the fix)
    scale = Math.min(widthScale, heightScale * 1.15);
  } else {
    const scaleX = availableWidth / gameWidth;
    const scaleY = availableHeight / gameHeight;
    scale = Math.min(scaleX, scaleY);
  }

  container.style.transform = "scale(" + scale + ")";
}
window.addEventListener("resize", scaleGame);
window.addEventListener("load", scaleGame);
</script>
</body>
</html>
